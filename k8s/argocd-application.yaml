apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-sample-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/USERNAME/REPO_NAME.git" # Replace with your real repo URL
    targetRevision: HEAD
    path: k8s/ # This tells ArgoCD to look inside the "k8s/" folder for YAMLs
  destination:
    server: "https://kubernetes.default.svc"
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
